name: Ingest Groww Corpus

# Trigger: 09:15 IST daily (UTC = IST - 5h30m → 03:45 UTC).
# GitHub Actions cron is UTC-only; scheduled runs may be delayed ≤15 min under load.
on:
  schedule:
    - cron: "45 3 * * *"   # 09:15 IST daily
  workflow_dispatch:
    inputs:
      force:
        description: "Re-scrape and re-embed even if page content is unchanged"
        type: boolean
        default: false

concurrency:
  group: ingest-groww
  cancel-in-progress: false  # singleton — queue, never overlap

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      TZ: Asia/Kolkata
      GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
      CHROMA_API_KEY:    ${{ secrets.CHROMA_API_KEY }}
      CHROMA_TENANT:     ${{ secrets.CHROMA_TENANT }}
      CHROMA_DATABASE:   ${{ secrets.CHROMA_DATABASE }}
      SLACK_WEBHOOK:     ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: phase_4_3_push_to_chroma/requirements.txt

      # Cache the bge-small-en-v1.5 model (~130 MB) so it isn't re-downloaded
      # on every run. Key is pinned to the model revision — bump to invalidate.
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1.5-v1

      - name: Install Python dependencies
        run: pip install -r phase_4_3_push_to_chroma/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # -----------------------------------------------------------------------
      # Main pipeline: Scrape → Chunk → Embed → Push to Chroma Cloud
      # -----------------------------------------------------------------------
      - name: Scrape → Chunk → Embed → Push to Chroma
        run: python phase_4_3_push_to_chroma/run.py

      # -----------------------------------------------------------------------
      # Upload the ingest report as a workflow artifact (retained 90 days)
      # -----------------------------------------------------------------------
      - name: Upload ingest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-report-${{ github.run_id }}
          path: phase_4_3_push_to_chroma/ingest_report.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text":":x: Groww ingest failed: run=${{ github.run_id }} branch=${{ github.ref_name }}"}'
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
