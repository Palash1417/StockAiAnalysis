embedder:
  provider: bge_local        # bge_local | openai | fake
  model: BAAI/bge-small-en-v1.5
  dim: 384
  batch_size: 64
  normalize: true
  hard_cap_per_run: 1000
  retry_backoff_seconds: [1, 3, 9, 27]
  max_attempts: 5

chunker:
  target_tokens: 500
  overlap_tokens: 80
  min_tokens: 100

snapshot:
  keep_versions: 7
